name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npm run build
      - run: npm test
      - run: npm start &
      - run: npx wait-on http://localhost:5174 && npm run test:ui
        env:
          BASE_URL: http://localhost:5174